general {
    base_exp_dir = ./exp/CASE_NAME/EXP_NAME
    recording = [
        ./,
        ./models
        ./confs
    ]
}

dataset {
    data_dir = ./public_data/CASE_NAME/
    render_cameras_name = cameras_sphere.npz
    object_cameras_name = cameras_sphere.npz
    with_projection = False
}

train {
    learning_rate = 1e-3
    learning_rate_alpha = 0.01
    end_iter = 100000

    batch_size = 512
    validate_resolution_level = 1
    warm_up_end = 5000
    anneal_end = 50000
    use_white_bkgd = False

    save_freq = 50000
    val_freq = 5000
    val_mesh_freq = 50000
    report_freq = 100

    igr_weight_begin = 0.1
    igr_weight_end = 0.1
    curv_weight_begin = 0.0
    curv_weight_end = 0.0
    mask_weight_begin = 1.0
    mask_weight_end = 1.0

    loss_type = l1
}

model {
    nerf {
        D = 4,
        d_in = 4,
        d_in_view = 3,
        W = 256,
        multires = 8,
        multires_view = 4,
        output_ch = 4,
        skips=[2],
        use_viewdirs=True
        encoding = default
        encoding_view = default
    }

    sdf_network {
        d_hidden = 256
        n_layers = 4
        skip_in = [2]
        multires = 8
        bias = 0.5
        scale = 1.0
        geometric_init = True
        weight_norm = True
        encoding = default
    }

    variance_network {
        init_val = 0.3
    }

    rendering_network {
        d_feature = 256
        mode = idr
        d_out = 3
        d_hidden = 256
        n_layers = 4
        weight_norm = True
        multires_view = 8
        encoding_view = default
        squeeze_out = True
        scale_viewdir = True
        render_mode = view_dependent
    }

    neus_renderer {
        n_samples = 64
        n_importance = 64
        n_outside = 0
        up_sample_steps = 4     # 1 for simple coarse-to-fine sampling
        perturb = 1.0
    }
}
